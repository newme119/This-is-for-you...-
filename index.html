<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday My Love</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: linear-gradient(135deg, #050003 0%, #1a000c 50%, #0d0006 100%);
            --bg-card: rgba(25, 10, 18, 0.75);
            --gold-primary: #dfba6b;
            --gold-gradient: linear-gradient(135deg, #bf953f 0%, #fcf6ba 25%, #b38728 50%, #fbf5b7 75%, #aa771c 100%);
            --text-light: #f5f5f5;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { max-width: 100%; overflow-x: hidden; }
        body {
            background: var(--bg-dark);
            background-attachment: fixed;
            font-family: 'Montserrat', sans-serif;
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        #heartBgContainer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .bg-heart { position: absolute; bottom: -20px; font-size: 20px; opacity: 0; animation: floatUp 6s linear infinite; }
        @keyframes floatUp { 0% { transform: translateY(0) scale(0); opacity: 0; } 10% { opacity: 0.4; } 90% { opacity: 0.4; } 100% { transform: translateY(-105vh) scale(1.2); opacity: 0; } }
        
        #preloader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050003; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.5s; }
        .loader-text { color: var(--gold-primary); font-size: 22px; font-weight: 600; margin-bottom: 20px; }
        
        .main-container { opacity: 0; transition: opacity 1s; text-align: center; width: 100%; max-width: 450px; padding: 20px; z-index: 2; }
        #audioToggle { display: none; position: fixed; top: 20px; right: 20px; z-index: 10000; background: rgba(223, 186, 107, 0.25); border: 1px solid var(--gold-primary); color: var(--gold-primary); width: 45px; height: 45px; border-radius: 50%; cursor: pointer; backdrop-filter: blur(5px); }
        
        .gift-container { cursor: pointer; width: 160px; height: 160px; margin: 0 auto 30px; position: relative; }
        .gift-box { width: 100%; height: 100%; background: #14020b; border: 2px solid var(--gold-primary); border-radius: 8px; }
        .gift-lid { position: absolute; top: -10px; width: 170px; height: 40px; background: #210413; border: 2px solid var(--gold-primary); transition: 0.6s; }
        .gift-container:hover .gift-lid { transform: translateY(-5px) rotate(-5deg); }

        .birthday-card { background: var(--bg-card); border: 1px solid rgba(223, 186, 107, 0.3); border-radius: 16px; padding: 30px; margin-bottom: 30px; }
        .long-message-box { background: rgba(255, 255, 255, 0.03); border-left: 3px solid var(--gold-primary); padding: 20px; text-align: left; }
        
        .polaroid { background: #ffffff; padding: 12px 12px 26px 12px; margin: 35px auto; width: 90%; max-width: 290px; }
        .polaroid img { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; }
        .polaroid-caption { color: #1a1a1a; font-size: 14px; font-weight: 600; margin-top: 10px; }
    </style>
</head>
<body>

    <!-- ✅ MUSIC FILE SET -->
    <audio id="bgMusic" loop src="music.mp3"></audio>

    <button id="audioToggle">🔊</button>
    <div id="heartBgContainer"></div>

    <div id="preloader">
        <div class="loader-text">Loading...</div>
    </div>

    <div class="main-container" id="mainContent">
        <div id="boxSection">
            <div class="gift-container" id="giftBoxBtn">
                <div class="gift-lid"></div>
                <div class="gift-box"></div>
            </div>
            <p>Tap the box to open ✨</p>
        </div>

        <div id="surpriseContent" style="display: none;">
            <div class="birthday-card">
                <h1>Happy Birthday My Love!</h1>
                <p>May your day be filled with luxury, love, and unending smiles.</p>
            </div>
            <div class="long-message-box">
                <h2>To My Favorite Person,</h2>
                <p>Happy Birthday to the one who makes my world infinitely brighter. You are my everything! ❤️</p>
            </div>
            <div class="polaroid-gallery">
                <div class="polaroid"><img src="https://images.unsplash.com/photo-1515934751635-c81c6bc9a2d8?w=500"><div class="polaroid-caption">Best moments ❤️</div></div>
            </div>
        </div>
    </div>

    <script>
        window.addEventListener('load', () => {
            document.getElementById('preloader').style.opacity = '0';
            setTimeout(() => document.getElementById('preloader').style.display = 'none', 500);
            document.getElementById('mainContent').style.opacity = '1';
        });

        const boxBtn = document.getElementById('giftBoxBtn');
        const bgMusic = document.getElementById('bgMusic');
        const audioToggle = document.getElementById('audioToggle');

        boxBtn.addEventListener('click', () => {
            bgMusic.play().catch(e => console.log("Play failed", e));
            audioToggle.style.display = 'flex';
            document.getElementById('boxSection').style.display = 'none';
            document.getElementById('surpriseContent').style.display = 'block';
        });

        audioToggle.addEventListener('click', () => {
            if (bgMusic.paused) { bgMusic.play(); audioToggle.innerHTML = '🔊'; }
            else { bgMusic.pause(); audioToggle.innerHTML = '🔇'; }
        });
    </script>
</body>
</html>
